version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: resumedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: eureka-server/target/eureka-server-0.0.1-SNAPSHOT.jar
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  resume-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: resume-service/target/resume-service-0.0.1-SNAPSHOT.jar
    ports:
      - "8081:8081"
    container_name: resume-service
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  parser-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: parser-service/target/parser-service-0.0.1-SNAPSHOT.jar
    container_name: parser-service
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: API-Gateway/target/API-Gateway-0.0.1-SNAPSHOT.jar
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data: